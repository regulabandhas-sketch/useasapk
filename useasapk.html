<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS | Cloud Converter</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <style>
        :root { --p: #9d4edd; --a: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: #0b090a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; width: 380px; text-align: center; }
        #logo { cursor: pointer; color: var(--p); font-size: 2.5rem; font-weight: bold; margin: 0; }
        .upload-box { border: 2px dashed rgba(255,255,255,0.2); padding: 40px 10px; border-radius: 20px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--p); background: rgba(157, 78, 221, 0.05); }
        .btn { background: var(--p); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:disabled { background: #444; }
        #result { display: none; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; border: 1px solid var(--a); }
        .url-text { font-size: 0.75rem; color: var(--a); word-break: break-all; margin: 10px 0; padding: 10px; background: #000; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        progress { width: 100%; height: 10px; accent-color: var(--p); display: none; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="logo">USEAS</h1>
    <p style="font-size: 0.8rem; color: #bc98ff; margin-top: 5px;">Google Cloud 5GB Portal</p>

    <div class="upload-box" onclick="document.getElementById('fileIn').click()">
        <span id="label">📂 Select File to Convert</span>
        <input type="file" id="fileIn" hidden onchange="fileSelected()">
    </div>

    <progress id="pBar" value="0" max="100"></progress>
    <button class="btn" id="upBtn" onclick="startCloudUpload()">Convert & Get Link</button>

    <div id="result">
        <p style="margin:0; font-weight: bold;">Cloud Link Ready! ✅</p>
        <div class="url-text" id="linkOut">Generating...</div>
        <button class="btn" style="background:#333; margin-top:10px; padding: 10px;" onclick="copyLink()">Copy Direct Link</button>
    </div>
</div>

<script>
    // YOUR OFFICIAL CONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyDeSZenagrebQwCHoZ5mMLHtT2fimxqBqk",
      authDomain: "useasapk.firebaseapp.com",
      projectId: "useasapk",
      storageBucket: "useasapk.firebasestorage.app",
      messagingSenderId: "381403433956",
      appId: "1:381403433956:web:d684fd12cd64086711d5f1"
    };

    // Initialize Firebase Compat
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let myFile = null;

    function fileSelected() {
        myFile = document.getElementById('fileIn').files[0];
        if(myFile) document.getElementById('label').innerText = "File: " + myFile.name;
    }

    function startCloudUpload() {
        if(!myFile) return alert("Select a file first!");
        
        const btn = document.getElementById('upBtn');
        const bar = document.getElementById('pBar');
        
        btn.disabled = true;
        btn.innerText = "Connecting to Google Cloud...";
        bar.style.display = "block";

        // Upload to 'conversions' folder in your Firebase storage
        const ref = storage.ref('conversions/' + myFile.name);
        const task = ref.put(myFile);

        task.on('state_changed', 
            (snapshot) => {
                const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                bar.value = percent;
                btn.innerText = "Uploading: " + Math.round(percent) + "%";
            }, 
            (err) => { 
                alert("Upload Failed! Make sure your Storage Rules are set to Public.");
                console.error(err);
                btn.disabled = false;
            }, 
            () => {
                task.snapshot.ref.getDownloadURL().then((url) => {
                    document.getElementById('result').style.display = "block";
                    document.getElementById('linkOut').innerText = url;
                    btn.innerText = "Conversion Finished!";
                    bar.style.display = "none";
                    
                    // Trigger Download
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "USEAS_" + myFile.name + ".apk";
                    a.click();
                });
            }
        );
    }

    function copyLink() {
        const text = document.getElementById('linkOut').innerText;
        navigator.clipboard.writeText(text);
        alert("Cloud Link Copied! You can paste this anywhere.");
    }

    // Secret Admin 5-tap (USEAS feature)
    let taps = 0;
    document.getElementById('logo').onclick = () => {
        taps++;
        if (taps === 5) { alert("USEAS Cloud Admin: Status Normal"); taps = 0; }
    };
</script>

</body>
</html>
